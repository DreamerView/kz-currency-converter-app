<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Конвертер валют НБ РК</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem; }
  </style>
</head>
<body class="bg-light container d-flex flex-column justify-content-center align-items-center">

  <h2 class="text-center mt-5 m-0">💱 Конвертер валют НБ РК</h2>

  <div class="row mt-4 pt-5 mx-auto" id="converter" style="max-width: 600px;width:100%;">
    <div class="col-12 mb-4">
        <label class="form-label">Сумма</label>
        <input id="amount" type="number" class="form-control" placeholder="Например, 100">
    </div>
    <div class="col-5">
        <label class="form-label">Из</label>
        <select id="fromCurrency" class="form-select"></select>
    </div>
    <div class="col-2 d-flex justify-content-center align-items-end">
        <button class="btn btn-secondary w-100" onclick="swapCurrencies()">↔</button>
    </div>
    <div class="col-5">
        <label class="form-label">В</label>
        <select id="toCurrency" class="form-select"></select>
    </div>
    <div class="col-12 mt-4">
        <label class="form-label">Результат</label>
        <div class="form-control bg-body-secondary" id="result">—</div>
    </div>
    <div class="col-12 mt-5 d-flex flex-column align-items-center">
        <p class="m-0 text-center">Данные получены с сайта</p>
        <a class="text-center" href="https://www.nationalbank.kz/ru">Национального банка Республики Казахстан</a>
    </div> 
  </div>
  <footer class="text-center mt-4 border-top">
        <p></p>Built with ❤️ by <strong>Temirkhan</strong></p>
        <p>Project at <a target="_blank" href="https://github.com/DreamerView/kz-currency-converter-app">Github</a></p>
    </footer>

  <script>
    const currencyMap = {};
    const currencyNames = {
      "AUD": "Австралийский доллар 🇦🇺",
      "AZN": "Азербайджанский манат 🇦🇿",
      "AMD": "Армянский драм 🇦🇲",
      "BYN": "Белорусский рубль 🇧🇾",
      "BRL": "Бразильский реал 🇧🇷",
      "HUF": "Венгерский форинт 🇭🇺",
      "HKD": "Гонконгский доллар 🇭🇰",
      "GEL": "Грузинский лари 🇬🇪",
      "DKK": "Датская крона 🇩🇰",
      "AED": "Дирхам ОАЭ 🇦🇪",
      "USD": "Доллар США 🇺🇸",
      "EUR": "Евро 🇪🇺",
      "INR": "Индийская рупия 🇮🇳",
      "IRR": "Иранский риал 🇮🇷",
      "CAD": "Канадский доллар 🇨🇦",
      "CNY": "Китайский юань 🇨🇳",
      "KWD": "Кувейтский динар 🇰🇼",
      "KGS": "Киргизский сом 🇰🇬",
      "MYR": "Малайзийский ринггит 🇲🇾",
      "MXN": "Мексиканское песо 🇲🇽",
      "MDL": "Молдавский лей 🇲🇩",
      "NOK": "Норвежская крона 🇳🇴",
      "PLN": "Польский злотый 🇵🇱",
      "SAR": "Саудовский риял 🇸🇦",
      "RUB": "Российский рубль 🇷🇺",
      "XDR": "СДР (спецправа) 🌐",
      "SGD": "Сингапурский доллар 🇸🇬",
      "TJS": "Таджикский сомони 🇹🇯",
      "THB": "Тайский бат 🇹🇭",
      "TRY": "Турецкая лира 🇹🇷",
      "UZS": "Узбекский сум 🇺🇿",
      "UAH": "Украинская гривна 🇺🇦",
      "GBP": "Фунт стерлингов 🇬🇧",
      "CZK": "Чешская крона 🇨🇿",
      "SEK": "Шведская крона 🇸🇪",
      "CHF": "Швейцарский франк 🇨🇭",
      "ZAR": "Южноафриканский рэнд 🇿🇦",
      "KRW": "Южнокорейская вона 🇰🇷",
      "JPY": "Японская иена 🇯🇵",
      "KZT": "Казахстанский тенге 🇰🇿"
    };

    const updateResult = () => {
      const amount = parseFloat(document.getElementById("amount").value);
      const from = document.getElementById("fromCurrency").value;
      const to = document.getElementById("toCurrency").value;
      const resultBox = document.getElementById("result");

      if (!from || !to || isNaN(amount)) return resultBox.textContent = "—";
      const converted = amount * (currencyMap[from] / currencyMap[to]);
      resultBox.textContent = `${converted.toFixed(2)} ${to}`;
    };

    const swapCurrencies = () => {
      const from = document.getElementById("fromCurrency");
      const to = document.getElementById("toCurrency");
      [from.value, to.value] = [to.value, from.value];
      updateResult();
    };

    const loadCurrency = async () => {
      const res = await fetch("https://api.allorigins.win/raw?url=https://nationalbank.kz/rss/rates_all.xml");
      const xml = await res.text();
      renderCurrency(xml);
      document.getElementById("saveBtn").classList.remove("d-none");
    };

    const renderCurrency = xmlStr => {
      const xml = new DOMParser().parseFromString(xmlStr, "text/xml");
      const items = [...xml.querySelectorAll("item")];
      const fromSelect = document.getElementById("fromCurrency");
      const toSelect = document.getElementById("toCurrency");

      currencyMap["KZT"] = 1;
      fromSelect.innerHTML = toSelect.innerHTML = '';

      const allCodes = ["KZT"];

      items.forEach(item => {
        const code = item.querySelector("title")?.textContent;
        const rate = parseFloat(item.querySelector("description")?.textContent);
        const quant = parseFloat(item.querySelector("quant")?.textContent);
        const value = rate / quant;
        currencyMap[code] = value;
        allCodes.push(code);
      });

      allCodes.forEach(code => {
        const label = currencyNames[code] || code;
        const option = `<option value="${code}" title="${label}">${label}</option>`;
        fromSelect.innerHTML += option;
        toSelect.innerHTML += option;
      });

      fromSelect.value = "KZT";
      toSelect.value = "USD";
      document.getElementById("converter").classList.remove("d-none");
      updateResult();
    };

    const saveCurrency = () => {
      fetch("https://api.allorigins.win/raw?url=https://nationalbank.kz/rss/rates_all.xml")
        .then(res => res.text())
        .then(xml => {
          localStorage.setItem("currency", xml);
          alert("Курсы сохранены в браузере!");
          document.getElementById("clearBtn").classList.remove("d-none");
        });
    };

    const clearCurrency = () => {
      localStorage.removeItem("currency");
      alert("Сохранённые курсы удалены.");
      document.getElementById("clearBtn").classList.add("d-none");
    };

    document.getElementById("fromCurrency").addEventListener("change", updateResult);
    document.getElementById("toCurrency").addEventListener("change", updateResult);
    document.getElementById("amount").addEventListener("input", updateResult);

    const saved = localStorage.getItem("currency");
    if (saved) {
      renderCurrency(saved);
      document.getElementById("clearBtn").classList.remove("d-none");
    }
    
    window.addEventListener("load",loadCurrency)
  </script>
</body>
</html>
